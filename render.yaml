# Blueprint for this repo only (separate from other Render apps).
# Create via Dashboard: https://dashboard.render.com/blueprints → New Blueprint Instance
services:
  - type: web
    name: swiftfixwp
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    disk:
      name: swiftfix-uploads
      mountPath: /var/www/html/wp-content/uploads
      sizeGB: 5
    envVars:
      - key: WORDPRESS_DB_HOST
        fromDatabase:
          name: swiftfix-db
          property: host
      - key: WORDPRESS_DB_USER
        fromDatabase:
          name: swiftfix-db
          property: user
      - key: WORDPRESS_DB_PASSWORD
        fromDatabase:
          name: swiftfix-db
          property: password
      - key: WORDPRESS_DB_NAME
        fromDatabase:
          name: swiftfix-db
          property: database
      - key: PORT
        value: "80"
      - key: AUTH_KEY
        generateValue: true
      - key: SECURE_AUTH_KEY
        generateValue: true
      - key: LOGGED_IN_KEY
        generateValue: true
      - key: NONCE_KEY
        generateValue: true
      - key: AUTH_SALT
        generateValue: true
      - key: SECURE_AUTH_SALT
        generateValue: true
      - key: LOGGED_IN_SALT
        generateValue: true
      - key: NONCE_SALT
        generateValue: true

databases:
  - name: swiftfix-db
    plan: free
    databaseName: wordpress
