# Blueprint for this repo only (separate from other Render apps).
# Create via Dashboard: https://dashboard.render.com/blueprints → New Blueprint Instance
services:
  - type: web
    name: swiftfixwp
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    disk:
      name: swiftfix-uploads
      mountPath: /var/www/html/wp-content/uploads
      sizeGB: 5
    envVars:
      # Postgres fromDatabase supports user/password/database/connectionString — not "host"
      # (host is for web/private services). Use the private connection URL for libpq.
      - key: DATABASE_URL
        fromDatabase:
          name: swiftfix-db
          property: connectionString
      - key: PORT
        value: "80"
      - key: PGSSLMODE
        value: prefer
      - key: AUTH_KEY
        generateValue: true
      - key: SECURE_AUTH_KEY
        generateValue: true
      - key: LOGGED_IN_KEY
        generateValue: true
      - key: NONCE_KEY
        generateValue: true
      - key: AUTH_SALT
        generateValue: true
      - key: SECURE_AUTH_SALT
        generateValue: true
      - key: LOGGED_IN_SALT
        generateValue: true
      - key: NONCE_SALT
        generateValue: true

databases:
  - name: swiftfix-db
    plan: free
    databaseName: wordpress
